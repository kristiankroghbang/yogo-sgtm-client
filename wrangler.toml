name = "yogo-sgtm-poller"
main = "worker.js"
compatibility_date = "2024-01-01"

# Poll every minute
[triggers]
crons = ["* * * * *"]

# Bind a KV namespace for persistent state
# Create with: wrangler kv namespace create YOGO_STATE
[[kv_namespaces]]
binding = "YOGO_STATE"
id = "YOUR_KV_NAMESPACE_ID"

# Set secrets with:
#   wrangler secret put YOGO_API_KEY
#   wrangler secret put SGTM_URL
#   wrangler secret put SGTM_SECRET
